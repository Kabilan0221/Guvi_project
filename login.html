<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - App</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/login.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
         <div class="col-md-6 col-lg-5">
              <div class="card shadow-sm border-0 rounded-3 mt-5">
                   <div class="card-body p-4">
                        <h3 class="text-center mb-4">Welcome Back</h3>
                        <div id="alertBox" class="d-none alert"></div>
                        <form id="loginForm">
                             <div class="mb-3">
                                  <label for="email" class="form-label">Email address</label>
                                  <input type="email" class="form-control" id="email" name="email" required>
                             </div>
                             <div class="mb-4">
                                  <label for="password" class="form-label">Password</label>
                                  <input type="password" class="form-control" id="password" name="password" required>
                             </div>
                             <button type="button" id="loginBtn" class="btn btn-primary w-100 py-2">Login</button>
                        </form>
                        <div class="text-center mt-3">
                             <span class="text-muted">Don't have an account? <a href="register.html">Register here</a></span>
                        </div>
                   </div>
              </div>
         </div>
    </div>
</div>
<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="js/login.js"></script>
</body>
</html>
