<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Frame</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Styles -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel shadow-sm">
            <div class="sidebar-header d-flex align-items-center mb-4">
                <i class="bi bi-hexagon-fill text-primary" style="font-size: 1.8rem;"></i>
                <h4 class="brand-text mb-0 ms-2 fw-bold text-dark">AppFrame</h4>
            </div>
            <ul class="nav flex-column sidebar-nav mt-3">
                <li class="nav-item">
                    <a class="nav-link active" href="index.html">
                        <i class="bi bi-grid-1x2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="profile.html">
                        <i class="bi bi-person"></i> Profile
                    </a>
                </li>
                <li class="nav-item mt-4 pt-4 border-top">
                    <a class="nav-link" href="login.html">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="register.html">
                        <i class="bi bi-person-plus"></i> Register
                    </a>
                </li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navbar -->
            <nav class="top-nav glass-panel mb-4 shadow-sm border-0">
                <div class="d-flex justify-content-between w-100 align-items-center px-2">
                    <h5 class="mb-0 fw-semibold text-dark">Overview</h5>
                    <div class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=User&background=4f46e5&color=fff" alt="User" class="rounded-circle avatar">
                    </div>
                </div>
            </nav>

            <!-- Dashboard Content Frame -->
            <div class="content-frame">
                <div class="row g-4 mb-4">
                    <div class="col-md-4">
                        <div class="glass-card stat-card p-4">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="text-muted fw-semibold mb-1">Total Users</div>
                                    <h2 class="fw-bold mb-0">1,245</h2>
                                </div>
                                <div class="icon-box bg-primary bg-opacity-10 text-primary rounded-circle p-3">
                                    <i class="bi bi-people-fill fs-4"></i>
                                </div>
                            </div>
                            <div class="mt-3 text-success small fw-semibold"><i class="bi bi-arrow-up"></i> 12% increase</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="glass-card stat-card p-4">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="text-muted fw-semibold mb-1">Active Sessions</div>
                                    <h2 class="fw-bold mb-0">842</h2>
                                </div>
                                <div class="icon-box bg-success bg-opacity-10 text-success rounded-circle p-3">
                                    <i class="bi bi-activity fs-4"></i>
                                </div>
                            </div>
                            <div class="mt-3 text-success small fw-semibold"><i class="bi bi-arrow-up"></i> 5% increase</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="glass-card stat-card p-4">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="text-muted fw-semibold mb-1">New Signups</div>
                                    <h2 class="fw-bold mb-0">142</h2>
                                </div>
                                <div class="icon-box bg-info bg-opacity-10 text-info rounded-circle p-3">
                                    <i class="bi bi-person-plus-fill fs-4"></i>
                                </div>
                            </div>
                            <div class="mt-3 text-danger small fw-semibold"><i class="bi bi-arrow-down"></i> 2% decrease</div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-12">
                        <div class="glass-card p-4">
                            <h5 class="fw-bold mb-4">Recent Activity</h5>
                            <div class="placeholder-glow">
                                <span class="placeholder col-12 mb-3 rounded py-3"></span>
                                <span class="placeholder col-12 mb-3 rounded py-3 bg-opacity-75"></span>
                                <span class="placeholder col-12 rounded py-3 bg-opacity-50"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
