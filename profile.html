<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - App</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/profile.css" rel="stylesheet">
</head>
<body class="bg-light" id="pageBody">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">App</a>
            <div class="d-flex">
                <button id="logoutBtn" class="btn btn-outline-light btn-sm px-3">Logout</button>
            </div>
        </div>
    </nav>
    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-4 p-md-5">
                        <h3 class="mb-4 text-primary">My Profile</h3>
                        <div id="alertBox" class="d-none alert"></div>
                        <form id="profileForm">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="fullName" class="form-label text-muted fw-semibold">Full Name</label>
                                    <input type="text" class="form-control bg-light" id="fullName" name="fullName">
                                </div>
                                <div class="col-md-6 mt-3 mt-md-0">
                                    <label for="age" class="form-label text-muted fw-semibold">Age</label>
                                    <input type="number" class="form-control bg-light" id="age" name="age">
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="dob" class="form-label text-muted fw-semibold">Date of Birth</label>
                                    <input type="date" class="form-control bg-light" id="dob" name="dob">
                                </div>
                                <div class="col-md-6 mt-3 mt-md-0">
                                    <label for="contact" class="form-label text-muted fw-semibold">Contact Number</label>
                                    <input type="text" class="form-control bg-light" id="contact" name="contact">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="address" class="form-label text-muted fw-semibold">Address</label>
                                <textarea class="form-control bg-light" id="address" name="address" rows="2"></textarea>
                            </div>
                            <div class="mb-4">
                                <label for="bio" class="form-label text-muted fw-semibold">Bio</label>
                                <textarea class="form-control bg-light" id="bio" name="bio" rows="3"></textarea>
                            </div>
                            <div class="d-flex justify-content-end">
                                 <button type="button" id="saveBtn" class="btn btn-primary px-4 py-2 fw-semibold">Save Profile</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
